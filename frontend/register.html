<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="favicon.ico?v=EVOPTIMA-V16-2026-04-22" sizes="any" />
  <title>EVOptima — Регистрация</title>
  <link rel="stylesheet" href="styles.css?v=EVOPTIMA-V16-2026-04-22" />
</head>
<body data-page="register">
<div class="app">
  <header>
    <div class="brand">
      <img src="logo-evoptima.jpeg" alt="EVOptima logo" />
      <div style="display:flex;flex-direction:column;gap:2px">
        <span>EVOptima</span>
        <span class="brand-subtitle" id="brandSubtitle">интеллектуальный AI-помощник</span>
      </div>
    </div>
    <div class="top-actions">
      <a class="back-btn" id="backBtn" href="index.html#profile">Назад</a>
      <button class="theme-btn" id="themeBtn" type="button">☀️</button>
      <div class="lang-wrap">
        <button class="lang-btn" id="langBtn">RU ▾</button>
        <div class="lang-menu" id="langMenu">
          <button class="menu-item" type="button" data-lang="RU">Русский</button>
          <button class="menu-item" type="button" data-lang="EN">English</button>
          <button class="menu-item" type="button" data-lang="DE">Deutsch</button>
        </div>
      </div>
    </div>
  </header>
  <main class="auth-page-wrap">
    <section class="auth-page">
      <div class="auth-card">
        <h1 class="auth-title" id="authTitle">Регистрация</h1>
        <p class="auth-sub" id="authSub">Создайте аккаунт, а после регистрации войдите в него на следующем экране.</p>
        <form id="authForm" autocomplete="off">
          <div class="auth-fields">
            <input id="authNickname" name="nickname" type="text" autocomplete="off" spellcheck="false" minlength="2" placeholder="Имя" required />
            <input id="authEmail" name="email" type="email" autocomplete="off" spellcheck="false" placeholder="Почта" required />
            <input id="authPassword" name="password" type="password" autocomplete="new-password" minlength="6" placeholder="Пароль" required />
          </div>
          <div class="auth-actions">
            <button class="primary-btn" id="authSubmitBtn" type="submit">Зарегистрироваться</button>
          </div>
        </form>
        <div class="auth-error" id="authError"></div>
        <div class="auth-links">
          <a id="authSwitchLink" href="login.html">Уже есть аккаунт? Войти</a>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <div class="faq-line">
      <button class="faq-toggle" id="faqToggle" type="button">FAQ</button>
      <div class="social-links">
        <a class="social-link" href="https://t.me/+u80NjDQpId01M2Uy" target="_blank" rel="noreferrer" aria-label="Telegram" title="Telegram">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.4 4.6a1.7 1.7 0 0 0-1.8-.2L3.7 10.8a1.1 1.1 0 0 0 .1 2.1l3.8 1.3 1.5 4.7a1.1 1.1 0 0 0 1.9.4l2.2-2.7 4.4 3.3a1.7 1.7 0 0 0 2.7-1L22 6.2a1.7 1.7 0 0 0-.6-1.6ZM9.4 13.7l7.8-5.6-6.1 6.6-.2 2.8-1.5-3.8Z"/></svg>
        </a>
        <a class="social-link" href="https://max.ru/join/ZWUdfXsSpWMmJ76GHrnJQzvInmeAFR_0VvvKdfZyq0c" target="_blank" rel="noreferrer" aria-label="Max" title="Max"><img src="max-logo.jpeg" alt="Max" /></a>
      </div>
    </div>
    <div class="faq-panel" id="faqPanel"></div>
    <div class="footer-note">стартап кафедры АСУ 09.03.01</div>
  </footer>
</div>
<script src="script.js?v=EVOPTIMA-V16-2026-04-22"></script>
</body>
</html>
